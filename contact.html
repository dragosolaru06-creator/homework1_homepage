<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <header>
        <h1>Homework 1 - Contact</h1>
    </header>
    
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="stats.html">Stats</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    
    <main id="main-content">
        <section>
            <h2>Get In Touch</h2>
            <p>Have questions about my work or want to collaborate? Send me a message!</p>
        </section>
        
        <form action="#" method="post">
            <fieldset>
                <legend>Contact Information</legend>
                
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required maxlength="100">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
            </fieldset>
            
            <fieldset>
                <legend>Message Details</legend>
                
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <select id="subject" name="subject" required>
                        <option value="">Choose a subject</option>
                        <option value="collaboration">Collaboration Opportunity</option>
                        <option value="feedback">Project Feedback</option>
                        <option value="job">Job Opportunity</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" required maxlength="1000"></textarea>
                </div>
            </fieldset>
            
            <div class="form-group">
                <button <a href="mailto:dragos.olaru06@e-uvt.ro" type="submit">Send Message</a></button>
            </div>
        </form>
    </main>
    
    <footer>
        <p>&copy; 2025 Homework 1 | Dragos</p>
    </footer>
</body>
</html>
